# fly.toml app configuration file generated for solar-storm-backend on 2026-03-29T14:09:06+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'solar-storm-backend'
primary_region = 'ord'

[build]
  dockerfile = 'backend/Dockerfile'

[env]
  PYTHONUNBUFFERED = '1'

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
